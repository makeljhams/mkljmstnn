<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anonymous Message</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
        }

        .card {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 400px;
        }

        h2 {
            color: #1c1e21;
            margin-top: 0;
            text-align: center;
        }

        p {
            color: #606770;
            font-size: 0.9rem;
            text-align: center;
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #4b4f56;
            font-size: 0.85rem;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #dddfe2;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1rem;
        }

            input:focus, textarea:focus {
                border-color: #1877f2;
                outline: none;
                box-shadow: 0 0 0 2px #e7f3ff;
            }

        button {
            width: 100%;
            padding: 12px;
            background-color: #00a400;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

            button:hover {
                background-color: #008a00;
            }
    </style>
</head>
<body>

    <div class="card">
        <h2>Send a Message</h2>
        <p>Your identity stays secret unless you share it.</p>

        <!-- Using your real endpoint: mdabzlop -->
        <form action="https://formspree.io/f/mdabzlop" method="POST">
            <label for="alias">Alias (Optional)</label>
            <input type="text" id="alias" name="alias" placeholder="e.g. Someone from Davao">

            <label for="message">Your Message</label>
            <textarea id="message" name="message" rows="5" placeholder="What's on your mind?" required></textarea>

            <!-- This redirects the user back to a nice "Thank You" page -->
            <input type="hidden" name="_next" value="https://formspree.io/thanks">

            <button type="submit">Send Anonymously</button>
        </form>
    </div>

</body>
</html>
